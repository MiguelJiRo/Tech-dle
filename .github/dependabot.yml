version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
      include: scope
    # Block major bumps for packages whose ecosystem hasn't caught up.
    # eslint 10 requires eslint-plugin-react to release a compatible version
    # (its current peerDep tops out at ^9.7), so the install fails on bump.
    # Remove the entry once the plugin ships v10 support.
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
